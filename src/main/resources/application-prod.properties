# ===========================
# SERVER
# ===========================
#server.port=8080
server.port=${PORT:10000}

# ===========================
# DATABASE
# ===========================
#following settings are important for render
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===========================
# JPA / HIBERNATE
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.sql.init.mode=never

spring.jpa.properties.hibernate.id.new_generator_mappings = false
spring.jpa.properties.hibernate.use_sql_comments=true
###TEMPORARY ADDED FOLLOWING LINE
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.defer-datasource-initialization=true
##################################


# ===========================
# LOGGING
# ===========================
logging.level.root=WARN
logging.level.com.pms=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE



# ===========================
# JWT
# ===========================
jwt.secret=my-super-secret-key-my-super-secret-key-123456
jwt.expiration=3600000  # 1 hour
password_reset.expiration=30 # 30 minutes
password_reset_ip=192.168.1.5
# ===========================
# SWAGGER (disable in prod)
# ===========================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ===========================
# ACTUATOR
# ===========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Log pattern for console
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{requestTraceId}] [%X{businessTraceId}] %-5level %logger{36} - %msg%n

# Log pattern for file
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%X{requestTraceId}] [%X{businessTraceId}] %-5level %logger{36} - %msg%n

logging.file.name=pms_logs.log
logging.file.path=logs

spring.security.user.name=admin
spring.security.user.password=admin123

# Enable multipart file uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.mail.host=smtp.sendgrid.net
spring.mail.port=465
spring.mail.username=ewb7FLStTPiUJI9vmWYQXQ
spring.mail.password=${SENDGRID_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.sendgrid.net
spring.mail.properties.mail.smtp.starttls.enable=false

# Set default timezone globally
spring.jackson.time-zone=Asia/Kolkata

password_reset_url=https://pms-hotelmanagement-project.onrender.com/reset-password

scheduler.minute=15
scheduler.hour=15

session.expire.hours=12